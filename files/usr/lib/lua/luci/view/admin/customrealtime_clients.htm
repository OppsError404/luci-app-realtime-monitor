<%+header%>
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Realtime Client Monitor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

/* ═══════════════════════════════════════════════════════════════════
   1. CUSTOM PROPERTIES
   ═══════════════════════════════════════════════════════════════════ */
#crm_root {
  /* Semantic tokens */
  --accent:      #1f8ef1;
  --success:     #28a745;
  --warning:     #f59e0b;
  --danger:      #ef4444;
  --bg:          transparent;
  --card:        transparent;
  --text:        #0b1220;
  --muted:       #4b5563;
  --line:        #e6e9ee;

  /* Shadows */
  --shadow-sm:   0 4px 12px  rgba(var(--clr-deep), 0.06);
  --shadow-md:   0 10px 20px rgba(var(--clr-deep), 0.08);
  --shadow-lg:   0 15px 30px rgba(var(--clr-deep), 0.12);

  /* Radii */
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   12px;

  /* Animation */
  --anim-dur:    1000ms;
  --anim-ease:   cubic-bezier(0.2, 0.85, 0.2, 1);

  /* Rate colours (resolved from RGB triples) */
  --rx-color:    rgba(var(--clr-accent), 1);
  --tx-color:    rgba(var(--clr-go), 1);

  /* Band RGB triples — all opacities derived via rgba() */
  --clr-lan:     45, 106, 79;    /* green  — LAN                */
  --clr-24:      180, 140, 60;   /* amber  — 2.4 GHz            */
  --clr-5:       33, 150, 243;   /* blue   — 5 GHz              */
  --clr-6:       171, 71, 188;   /* purple — 6 GHz              */
  --clr-bridge:  99, 102, 241;   /* indigo — Bridge / AP        */
  --clr-iface:   0, 165, 165;    /* teal   — Interface Rates    */

  /* UI chrome RGB triples */
  --clr-black:   0, 0, 0;
  --clr-ink:     5, 5, 5;
  --clr-deep:    15, 23, 42;
  --clr-abyss:   2, 6, 23;
  --clr-mid:     107, 114, 128;
  --clr-white:   255, 255, 255;
  --clr-accent:  31, 142, 241;
  --clr-go:      40, 167, 69;

  font-family: Inter, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  box-sizing: border-box;
  display: block;
  width: 100%;
}

/* ═══════════════════════════════════════════════════════════════════
   2. SHELL & LAYOUT
   ═══════════════════════════════════════════════════════════════════ */
#crm_root .crm-shell {
  background: var(--bg);
  padding: 0 0 8px;
  margin-top: -8px;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

#crm_root .crm-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 8px;
}

/* ═══════════════════════════════════════════════════════════════════
   3. HEADER
   ═══════════════════════════════════════════════════════════════════ */
#crm_root header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  height: 60px;
  padding: 10px 15px;
  background: var(--card);
  border: none;
  border-radius: var(--radius-lg);
  box-shadow: none;
  overflow: visible;
}

#crm_root header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(31, 142, 241, 0.9) 35%,
    rgba(40, 167,  69, 0.7) 65%,
    transparent 100%
  );
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  animation: hdrSweep 3.5s linear infinite;
  pointer-events: none;
}

#crm_root .h-left h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  white-space: nowrap;
  color: var(--text);
  letter-spacing: 0.1px;
}

#crm_root .header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

#crm_root .controls-row {
  display: flex;
  gap: 8px;
  align-items: center;
  white-space: nowrap;
}

#crm_root #last {
  font-family: 'JetBrains Mono', monospace, inherit;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  color: rgba(31, 142, 241, 0.5);
}

/* Force refresh button */
#crm_root #forceRefreshBtn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 6px;
  background: transparent;
  border: 1px solid rgba(var(--clr-accent), 0.30);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace, inherit;
  font-size: 11px;
  font-weight: 600;
  outline: none;
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: border-color 150ms ease, color 150ms ease, transform 120ms ease;
}
#crm_root #forceRefreshBtn:focus,
#crm_root #forceRefreshBtn:focus-visible { outline: none; box-shadow: none; }
#crm_root #forceRefreshBtn:hover {
  border-color: rgba(var(--clr-accent), 0.65);
  color: rgba(var(--clr-deep), 1);
}
#crm_root #forceRefreshBtn:active { transform: scale(0.97); }
#crm_root #forceRefreshBtn .refresh-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════════════
   4. DROPDOWNS
   ═══════════════════════════════════════════════════════════════════ */
#crm_root .select-mini {
  position: relative;
  display: inline-flex;
  align-items: center;
  height: fit-content;
  z-index: 100;
}

/* Iface mini — needs high z-index so dropdown clears sibling cards */
#crm_root #ifaceMini_pc,
#crm_root #ifaceMini_mob {
  position: relative;
  z-index: 10;
}
/* Elevate the whole card on hover so its dropdown clears siblings */
#crm_root .client.card-iface:hover,
#crm_root .client.card-iface:focus-within {
  z-index: 50;
}

#crm_root .select-mini .trigger {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 6px;
  background: transparent;
  border: 1px solid rgba(var(--clr-go), 0.25);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 150ms ease, box-shadow 150ms ease;
}

#crm_root .select-mini .trigger:hover,
#crm_root .select-mini .trigger.glow {
  border-color: rgba(var(--clr-go), 0.55);
}

/* Iface mini — teal border instead of green */
#crm_root #ifaceMini_pc .trigger,
#crm_root #ifaceMini_mob .trigger { border-color: rgba(var(--clr-iface), 0.25); }
#crm_root #ifaceMini_pc .trigger:hover,
#crm_root #ifaceMini_pc .trigger.glow,
#crm_root #ifaceMini_mob .trigger:hover,
#crm_root #ifaceMini_mob .trigger.glow { border-color: rgba(var(--clr-iface), 0.55); }

#crm_root .select-mini .trigger:active {
  transform: scale(1.03);
  transition: transform 120ms ease;
}

#crm_root .select-mini .trigger .label,
#crm_root .select-mini .trigger #autoLabel,
#crm_root .select-mini .trigger #unitLabel {
  font-family: 'JetBrains Mono', monospace, inherit;
  font-size: 11.5px;
  font-weight: 550;
  background: transparent;
  padding: 0;
  margin: 0;
  text-transform: none;
  transition: color 150ms ease;
  color: var(--text) !important;
}

#crm_root .select-mini .trigger:hover .label,
#crm_root .select-mini .trigger:hover #autoLabel,
#crm_root .select-mini .trigger:hover #unitLabel,
#crm_root .select-mini .trigger.glow .label,
#crm_root .select-mini .trigger.glow #autoLabel,
#crm_root .select-mini .trigger.glow #unitLabel {
  color: rgba(var(--clr-deep), 1);
}

#crm_root .trigger-caret {
  font-size: 11px;
  opacity: 0.6;
  padding: 0;
  gap: 0;
  transition: transform 160ms ease, opacity 160ms ease;
}
#crm_root .select-mini.open .trigger-caret {
  transform: rotate(180deg);
  opacity: 1;
}

/* Warning icon — only shown at 1 s poll interval */
#crm_root .trigger-warn {
  display: none;
  font-size: 11px;
  color: var(--warning);
  margin-right: 2px;
  cursor: default;
}

/* Dropdown panel */
#crm_root .dd-panel {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  padding: 4px;
  background: #ffffff;
  border: 1px solid rgba(var(--clr-deep), 0.12);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 24px rgba(var(--clr-deep), 0.12);
  z-index: 99999;
}
#crm_root .select-mini.open .dd-panel { display: block; }
#crm_root .dd-panel.open { display: block; }

#crm_root .dd-panel button.opt {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 7px 10px;
  background: transparent;
  border: 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: rgba(var(--clr-deep), 0.65);
  font-family: 'JetBrains Mono', monospace, inherit;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2px;
  text-align: center;
  transition: background 120ms ease, color 120ms ease;
}
#crm_root .dd-panel button.opt:hover {
  background: rgba(var(--clr-deep), 0.06);
  color: rgba(var(--clr-deep), 0.9);
}

#crm_root .dd-panel button.opt.selected {
  background: rgba(var(--clr-accent), 0.16);
  color: #1f8ef1;
  font-weight: 700;
  position: relative;
}
#crm_root .dd-panel button.opt.selected::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: #1f8ef1;
  border-radius: 0 3px 3px 0;
}

/* Iface combined + smart opt variants */
#crm_root #ifacePanel_pc.dd-panel button.opt-combined,
#crm_root #ifacePanel_mob.dd-panel button.opt-combined {
  color: rgba(var(--clr-iface), 0.9) !important;
  font-style: italic;
}
#crm_root #ifacePanel_pc.dd-panel button.opt-combined.selected,
#crm_root #ifacePanel_mob.dd-panel button.opt-combined.selected {
  color: rgba(var(--clr-iface), 1) !important;
}
#crm_root #ifacePanel_pc.dd-panel button.opt-combined.selected::before,
#crm_root #ifacePanel_mob.dd-panel button.opt-combined.selected::before {
  background: rgba(var(--clr-iface), 1);
}
#crm_root #ifacePanel_pc.dd-panel button.opt-smart::after,
#crm_root #ifacePanel_mob.dd-panel button.opt-smart::after {
  content: '✦';
  font-size: 7px;
  margin-left: 4px;
  opacity: 0.5;
  font-style: normal;
}

/* Iface panels — shared scrollable container */
#crm_root #ifacePanel_pc.dd-panel,
#crm_root #ifacePanel_mob.dd-panel {
  min-width: 100px;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(128,128,128,0.3) transparent;
}
#crm_root #ifacePanel_pc.dd-panel::-webkit-scrollbar,
#crm_root #ifacePanel_mob.dd-panel::-webkit-scrollbar { width: 3px; }
#crm_root #ifacePanel_pc.dd-panel::-webkit-scrollbar-track,
#crm_root #ifacePanel_mob.dd-panel::-webkit-scrollbar-track { background: transparent; }
#crm_root #ifacePanel_pc.dd-panel::-webkit-scrollbar-thumb,
#crm_root #ifacePanel_mob.dd-panel::-webkit-scrollbar-thumb {
  background: rgba(128,128,128,0.35);
  border-radius: 99px;
}
/* PC iface panel */
#crm_root #ifacePanel_pc.dd-panel {
  width: max-content;
  max-width: 260px;
}
#crm_root #ifacePanel_pc.dd-panel button.opt {
  justify-content: flex-start;
  color: rgba(var(--clr-deep), 0.8) !important;
  font-size: 11px;
  padding: 3px 8px;
  white-space: nowrap;
}
/* Mob iface panel */
#crm_root #ifacePanel_mob.dd-panel {
  width: max-content;
  max-width: 160px;
  font-size: 9px;
}
#crm_root #ifacePanel_mob.dd-panel button.opt {
  justify-content: flex-start;
  font-size: 9px !important;
  padding: 2px 5px;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════════════════
   5. SHARED CARD & PANEL PRIMITIVES
   ═══════════════════════════════════════════════════════════════════ */

/* Frequency badge */
#crm_root .band-title-wrap {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}

#crm_root .freq-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.76em;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1;
}
#crm_root .freq-badge-24 { background: rgba(var(--clr-24),  0.13); border: 1px solid rgba(var(--clr-24),  0.26); color: rgba(var(--clr-24), 1); }
#crm_root .freq-badge-5  { background: rgba(var(--clr-5),   0.15); border: 1px solid rgba(var(--clr-5),   0.28); color: #64b5f6; }
#crm_root .freq-badge-6  { background: rgba(var(--clr-6),   0.16); border: 1px solid rgba(var(--clr-6),   0.28); color: #ce93d8; }

/* SSID name badge */
#crm_root .ssid-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1.3;
  letter-spacing: 0.2px;
  margin-right: -3px;
}
#crm_root .ssid-badge-24 { background: rgba(var(--clr-24), 0.10); border: 1px solid rgba(var(--clr-24), 0.28); color: rgba(var(--clr-24), 1); }
#crm_root .ssid-badge-5  { background: rgba(var(--clr-5),  0.10); border: 1px solid rgba(var(--clr-5),  0.30); color: rgba(var(--clr-5),  1); }
#crm_root .ssid-badge-6  { background: rgba(var(--clr-6),  0.12); border: 1px solid rgba(var(--clr-6),  0.30); color: rgba(var(--clr-6),  1); }

/* LAN & Iface title badges — shared shape, different colour */
#crm_root .lan-title-badge,
#crm_root .iface-title-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: 0.2px;
  line-height: 1.3;
}
#crm_root .lan-title-badge   { background: rgba(var(--clr-lan),   0.10); border: 1px solid rgba(var(--clr-lan),   0.32); color: rgba(var(--clr-lan),   0.9); }
#crm_root .iface-title-badge { background: rgba(var(--clr-iface), 0.10); border: 1px solid rgba(var(--clr-iface), 0.25); color: rgba(var(--clr-iface), 0.9); }

/* Interface status dot */
#crm_root .iface-oper {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #9aa4b2;
}
#crm_root .iface-oper.up   { background: #28a745; }
#crm_root .iface-oper.down { background: #ef4444; }

#crm_root .band-ssid {
  font-weight: 650;
  font-size: 16px;
  color: var(--text);
  letter-spacing: 0.3px;
  line-height: 1;
}

/* Panel footer */
#crm_root .panel-foot {
  display: flex;
  padding: 0 10px;
  border-top: 1px solid var(--line);
  margin-top: 2px;
}

#crm_root .total-text {
  font-family: monospace;
  font-size: 10px;
  color: var(--muted);
  opacity: 0.9;
  margin: 3px 0 -9px;
}

#crm_root .panel-count {
  color: var(--muted);
  font-size: 11px;
  min-width: 28px;
  text-align: right;
}

/* Empty state */
#crm_root .empty {
  color: var(--muted);
  font-size: 13px;
  padding: 4px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  height: 100%;
}

#crm_root .empty-panel { opacity: 0.55; font-style: italic; }
#crm_root .empty-panel .panel-title,
#crm_root .empty-panel .band-title { color: var(--muted); margin-top: -10px; }
#crm_root .empty-panel .total-text { color: var(--muted); margin-bottom: -10px; }

#crm_root .band-lan.empty-panel       { border: 1px dashed rgba(var(--clr-lan),    0.60) !important; }
#crm_root .band-24.empty-panel        { border: 1px dashed rgba(var(--clr-24),     0.60) !important; }
#crm_root .band-5.empty-panel         { border: 1px dashed rgba(var(--clr-5),      0.60) !important; }
#crm_root .band-6.empty-panel         { border: 1px dashed rgba(var(--clr-6),      0.60) !important; }
#crm_root .bridge-ap-band.empty-panel { border: 1px dashed rgba(var(--clr-bridge), 0.60) !important; }

/* Pulse-ring empty state */
#crm_root .empty-pulse {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0;
  width: 100%;
  margin-top: -25px;
}
#crm_root .empty-pulse-ring {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1.5px solid rgba(var(--clr-accent), 0.22);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
}
#crm_root .empty-pulse-ring::before {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 1px solid rgba(var(--clr-accent), 0.10);
  animation: emptyPulse 2.6s ease-out infinite;
}
#crm_root .empty-pulse-ring::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px solid rgba(var(--clr-accent), 0.05);
  animation: emptyPulse 2.6s ease-out 0.65s infinite;
}
#crm_root .empty-pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(var(--clr-accent), 0.30);
}
#crm_root .empty-pulse-texts {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
#crm_root .empty-pulse-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
}
#crm_root .empty-pulse-sub {
  font-size: 10px;
  color: var(--muted);
  opacity: 0.55;
  text-align: center;
  max-width: 200px;
  line-height: 1.4;
  margin-bottom: -5px;
}

/* Bridge */
#crm_root .bridge-client-count { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 2px; }
#crm_root .bridge-device-mac   { font-family: monospace; font-size: 9.5px; color: var(--muted); opacity: 0.8; margin-top: 1px; letter-spacing: 0.1px; }

/* Bridge sub-client list */
#crm_root .sub-clients {
  border-top: 1px solid var(--line);
  margin-top: 6px;
  padding-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
#crm_root .sub-client-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 6px;
  border-radius: var(--radius-sm);
  font-size: 10.5px;
  color: var(--muted);
  background: rgba(var(--clr-black), 0.03);
  border: 1px solid transparent;
  cursor: default;
  transition: background 120ms, border-color 120ms;
}
#crm_root .sub-client-row:hover { background: rgba(var(--clr-black), 0.06); border-color: var(--line); }
#crm_root .sub-client-dot  { width: 5px; height: 5px; border-radius: 50%; background: rgba(var(--clr-accent), 0.45); flex-shrink: 0; }
#crm_root .sub-client-host { font-weight: 600; color: var(--text); min-width: 80px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#crm_root .sub-client-ip   { font-family: monospace; font-size: 10px; color: var(--muted); opacity: 0.8; }
#crm_root .sub-client-mac  { font-family: monospace; font-size: 9.5px; color: var(--muted); opacity: 0.5; margin-left: auto; }
#crm_root .sub-clients-header { font-size: 9px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: var(--muted); opacity: 0.55; margin-bottom: 2px; padding: 0 2px; }

/* Icon utilities */
#crm_root .label-icon-left,
#crm_root .label-icon-right { display: inline-flex; align-items: center; }
#crm_root .icon-small       { width: 14px; height: 14px; display: inline-block; }
#crm_root .icon-small svg   { width: 90%; height: 90%; display: block; }

/* Bridge AP band */
#crm_root .bridge-ap-band { border: 1px solid rgba(var(--clr-bridge), 0.60) !important; background: rgba(var(--clr-bridge), 0.02) !important; }

/* Per-band panel tints */
#crm_root .band-lan   { background: rgba(var(--clr-lan),   0.02) !important; border: 1px solid rgba(var(--clr-lan),   0.60) !important; outline: none !important; }
#crm_root .band-iface { background: rgba(var(--clr-iface), 0.02) !important; border: 1px solid rgba(var(--clr-iface), 0.55) !important; outline: none !important; }
#crm_root .band-24    { background: rgba(var(--clr-24),    0.02) !important; border: 1px solid rgba(var(--clr-24),    0.60) !important; outline: none !important; }
#crm_root .band-5     { background: rgba(var(--clr-5),     0.02) !important; border: 1px solid rgba(var(--clr-5),     0.60) !important; outline: none !important; }
#crm_root .band-6     { background: rgba(var(--clr-6),     0.02) !important; border: 1px solid rgba(var(--clr-6),     0.60) !important; outline: none !important; }

/* Per-band client card borders */
#crm_root .client.card-lan    { border: 1px solid rgba(var(--clr-lan),    0.55) !important; }
#crm_root .client.card-24     { border: 1px solid rgba(var(--clr-24),     0.55) !important; }
#crm_root .client.card-5      { border: 1px solid rgba(var(--clr-5),      0.55) !important; }
#crm_root .client.card-6      { border: 1px solid rgba(var(--clr-6),      0.55) !important; }

#crm_root .client.card-iface  { border: 1px solid rgba(var(--clr-iface),  0.55) !important; }

/* ═══════════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════════ */
@media screen and (max-width: 979px) and (orientation: portrait) {

  #crm_root .pc-bands { display: none !important; }
  #crm_root .grid     { display: block; }
  #crm_root #iface_rates_wrap .band         { display: none !important; }
  #crm_root #iface_rates_wrap .mobile-panel { display: flex !important; }

  #crm_root .mobile-panel {
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: visible;
    display: flex;
    flex-direction: column;
    position: relative;
    margin-bottom: 16px;
    box-shadow: 1px 2px 6px rgba(var(--clr-black), 0.35);
  }

  #crm_root .mobile-panel .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    border-bottom: 0.5px solid var(--line);
  }

  #crm_root .mobile-panel .panel-title { font-weight: 650; font-size: 14px; color: var(--text); }

  #crm_root .list { display: block; padding: 10px 10px 2px; }

  #crm_root .client {
    position: relative;
    background: var(--card);
    border-radius: var(--radius-md);
    padding: 10px 6px 8px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 40px;
    box-shadow: 1px 1px 4px rgba(var(--clr-black), 0.35);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;                        /* keep card on own GPU layer — prevents text/canvas blur on hover */
    transform: translate3d(0, 0, 0);               /* promote layer at rest */
    transition: box-shadow 200ms ease, transform 200ms ease, outline 200ms ease;
  }
  #crm_root .client:hover,
  #crm_root .client:active {
    box-shadow: 0 2px 10px rgba(var(--clr-ink), 0.60);
    transform: translate3d(0, -2px, 0);            /* integer-only translate, no scale — scale causes sub-pixel blur */
  }

  #crm_root .client.graph-open {
    outline: 1px solid rgba(var(--clr-accent), 0.6);
    outline-offset: 1px;
    box-shadow: 0 0 10px rgba(var(--clr-accent), 0.6);
  }

  #crm_root .top-dot {
    position: absolute;
    top: 8px; right: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    pointer-events: none;
  }

  #crm_root .wifi-icon-mobile { width: 21px; height: 21px; }
  #crm_root .wifi-icon-mobile svg,
  #crm_root .wifi-icon-pc     svg { width: 100%; height: 100%; display: block; }

  #crm_root .signal-text { font-size: 9px; color: var(--muted); font-family: monospace; line-height: 1; }

  #crm_root .client-top {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding-top: 2px;
  }

  #crm_root .host-name-mobile {
    font-weight: 600;
    font-size: 11px;
    color: var(--text);
    line-height: 1.04;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  #crm_root .host-mac-mobile { color: var(--muted); font-family: monospace; font-size: 10px; font-weight: 400; margin: 2px 0; }

  #crm_root .lan-port-label { position: absolute; top: 6px; left: 8px; font-family: monospace; font-size: 9px; color: var(--muted); }

  #crm_root .client-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    width: 100%;
    padding: 4px 0 3px;
  }

  #crm_root .rates { display: flex; gap: 1px; align-items: center; justify-content: center; }

  #crm_root .rate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 2px 9px;
    background: rgba(255,255,255,0.03);
    position: relative;
    transition: background 0.18s ease;
  }
  #crm_root .rate:hover { background: rgba(255,255,255,0.055); }
  #crm_root .rx-rate-mobile { border-radius: 10px 2px 2px 10px; border: 1px solid rgba(var(--clr-accent), 0.22); }
  #crm_root .tx-rate-mobile { border-radius: 2px 10px 10px 2px; border: 1px solid rgba(var(--clr-go),    0.22); }

  #crm_root .rate strong {
    display: block;
    font-size: 0.83em;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace, inherit;
    letter-spacing: 0.1px;
    white-space: nowrap;
    line-height: 1.25;
  }
  #crm_root .rx-rate-mobile strong { color: var(--rx-color); }
  #crm_root .tx-rate-mobile strong { color: var(--tx-color); }

  #crm_root .rate small {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 0.50em;
    font-weight: 450;
    white-space: nowrap;
    letter-spacing: 0.15px;
    line-height: 1;
    margin: -1px 0;
  }
  #crm_root .rx-rate-mobile small { color: var(--rx-color); opacity: 0.55; }
  #crm_root .tx-rate-mobile small { color: var(--tx-color); opacity: 0.55; }
  #crm_root .rate small .icon-small { width: 9px; height: 9px; }

  #crm_root .rate .rate-stats { display: none; }

  #crm_root .rate-stats-row {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 0 0 -5px;
  }
  #crm_root .rate-stats-row .rate-stats {
    display: block;
    font-family: 'JetBrains Mono', monospace, inherit;
    font-size: 7px;
    line-height: 1.2;
    opacity: 0.65;
    white-space: pre;
    padding: 1px 12px;
    text-align: center;
    letter-spacing: 0.1px;
  }
  #crm_root .rate-stats-row .rx-stats,
  #crm_root .rate-stats-row .tx-stats { color: var(--muted); }

  #crm_root .rx-rate-mobile small .label-icon-left  { margin-right: -3px; }
  #crm_root .tx-rate-mobile small .label-icon-right { margin-left:  -3px; }

  /* Collapsible totals */
  #crm_root .totals {
    height: 0;
    opacity: 0;
    overflow: hidden;
    margin: 4px 0 2px;
    font-family: monospace;
    color: var(--muted);
    transition: height 320ms cubic-bezier(0.4, 0, 0.2, 1), opacity 320ms ease;
  }
  #crm_root .totals.open { opacity: 1; }
  #crm_root .totals .totals-inner { padding: 0 2px; color: var(--muted); font-size: 9px; text-align: left; }

  /* Collapsible graph */
  #crm_root .graph-mobile {
    box-sizing: border-box;
    height: 0;
    overflow: hidden;
    width: 100%;
    min-width: 280px;
    border: 1px dashed transparent;               /* transparent when collapsed — prevents border showing at height:0 */
    border-radius: var(--radius-sm);
    background: var(--card);
    position: relative;
    padding: 0 6px;                                /* keep canvas away from left/right border edges */
    transition: height 320ms cubic-bezier(0.4, 0, 0.2, 1),
                border-color 320ms ease;           /* smooth fade-in with height */
  }
  #crm_root .graph-mobile.open {
    border-color: rgba(var(--clr-ink), 0.7);       /* only visible when expanded */
  }
  #crm_root .graph-canvas-mobile {
    width: 100%;
    height: 170px;
    display: block;
    border-radius: var(--radius-sm);
  }

  #crm_root .total-text      { font-size: 8px; margin-bottom: 4px; }
  #crm_root .empty-pulse     { margin-top: 0; }
  #crm_root .empty-pulse-sub { margin-bottom: -10px; }
  #crm_root .band-ssid       { font-size: 14px; font-weight: 600; }

} /* end mobile portrait */

/* ═══════════════════════════════════════════════════════════════════
   7. DESKTOP / LANDSCAPE BANDS & CARDS  (≥ 980 px or landscape)
   ═══════════════════════════════════════════════════════════════════ */
@media screen and (min-width: 980px), screen and (orientation: landscape) {

  #crm_root .grid     { display: none !important; }
  #crm_root .pc-bands { display: block; }
  #crm_root #iface_rates_wrap .mobile-panel { display: none   !important; }
  #crm_root #iface_rates_wrap .band         { display: block  !important; }

  #crm_root .band {
    background: rgba(var(--clr-deep), 0.05);
    border-radius: var(--radius-lg);
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid rgba(var(--clr-deep), 0.15);
    box-shadow: var(--shadow-sm);
  }

  #crm_root .band-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    margin-bottom: 0;
    border-bottom: 0.5px solid var(--line);
  }

  #crm_root .empty-panel .band-head {
    padding-bottom: 0;
    margin-bottom: 0;
    border-bottom: none;
  }

  #crm_root .band-inner {
    padding-top: 8px;
  }

  #crm_root .band-title {
    display: flex;
    align-items: center;
    font-weight: 650;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 0.3px;
    margin: 0;

  #crm_root .client-wrapper { position: relative; margin-bottom: 14px; z-index: 1; }

  #crm_root .client {
    display: grid;
    grid-template-columns: 100px 0.8fr 1.2fr;
    grid-template-rows: auto auto;
    padding: 5px;
    background: var(--card) !important;
    border: 0.5px solid rgba(var(--clr-ink), 0.3);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    position: relative;
    z-index: 2;
    min-width: 560px;
    overflow: visible;
    will-change: transform;                        /* keep card on own GPU layer — prevents text/canvas blur on hover */
    transform: translate3d(0, 0, 0);               /* promote layer at rest */
    transition: transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  #crm_root .client:hover {
    transform: translate3d(0, -3px, 0) !important; /* integer-only translate, no scale — scale causes sub-pixel blur */
    box-shadow: 0 0 20px rgba(var(--clr-abyss), 0.70) !important;
    outline: 3px solid rgba(var(--clr-mid), 0.18) !important;
    outline-offset: 2px;
  }

  #crm_root .client.graph-open {
    outline: 1px solid rgba(var(--clr-accent), 0.6) !important;
    outline-offset: 2px !important;
    box-shadow: var(--shadow-lg);
  }

  #crm_root .left-stack {
    grid-column: 1;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px;
    gap: 6px;
    z-index: 3;
    position: relative;
  }
  #crm_root .left-stack .host-top { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; max-width: 156px; }
  #crm_root .left-stack .hostname { margin: 0; padding: 0; font-weight: 600; font-size: 14px; color: var(--text); line-height: 1.15; overflow-wrap: break-word; word-break: break-word; white-space: normal; }
  #crm_root .left-stack .mac      { margin-top: 6px; font-size: 11px; font-weight: 400; color: var(--muted); max-width: 156px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }

  #crm_root .left-stack .signal-bottom {
    position: absolute;
    bottom: 2px; left: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  #crm_root .wifi-icon-pc { width: 35px; height: 25px; display: inline-block; }

  #crm_root .signal-text-pc {
    font-size: 10px;
    color: var(--muted);
    margin-top: -15px;
    text-align: center;
    margin-left: -12px;
  }

  #crm_root .lan-port-label-pc { position: absolute; font-family: monospace; font-size: 11px; color: var(--muted); left: 4px; bottom: 2px; }

  #crm_root .rates-wrapper {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    min-width: 0;
  }

  #crm_root .rates { display: flex; gap: 1px; align-items: center; justify-content: center; min-width: 0; }

  #crm_root .rx,
  #crm_root .tx {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 3px 22px;
    background: rgba(255,255,255,0.03);
    position: relative;
    min-width: 0;
    transition: background 0.18s ease;
  }
  #crm_root .rx:hover,
  #crm_root .tx:hover { background: rgba(255,255,255,0.055); }
  #crm_root .rx { border-radius: 10px 2px 2px 10px; border: 1px solid rgba(var(--clr-accent), 0.22); }
  #crm_root .tx { border-radius: 2px 10px 10px 2px; border: 1px solid rgba(var(--clr-go),    0.22); }

  #crm_root .rate-number {
    font-size: 0.96em;
    font-weight: 550;
    font-family: 'JetBrains Mono', monospace, inherit;
    letter-spacing: 0.2px;
    white-space: nowrap;
    line-height: 1.25;
    margin-top: -1px;
  }
  #crm_root .rx .rate-number { color: var(--rx-color); opacity: .95; }
  #crm_root .tx .rate-number { color: var(--tx-color); opacity: .95; }

  #crm_root .rate-label {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 0.60em;
    font-weight: 500;
    white-space: nowrap;
    letter-spacing: 0.15px;
    line-height: 1;
    margin: 1px 0 -2px;
    opacity: .9;
  }
  #crm_root .rx .rate-label { color: var(--rx-color); opacity: 0.55; }
  #crm_root .tx .rate-label { color: var(--tx-color); opacity: 0.55; }
  #crm_root .rate-label .icon-small { width: 8px; height: 8px; margin-bottom: 2px; }

  #crm_root .rate-stats { display: none; }

  #crm_root .rate-stats-row { display: flex; justify-content: center; gap: 1px; margin-top: 3px; }
  #crm_root .rate-stats-row .rate-stats {
    display: block;
    font-family: 'JetBrains Mono', monospace, inherit;
    font-size: 8.2px;
    line-height: 1.4;
    opacity: 0.85;
    white-space: pre;
    padding: 1px 20px;
    text-align: center;
    letter-spacing: 0.25px;
  }
  #crm_root .rate-stats-row .rx-stats,
  #crm_root .rate-stats-row .tx-stats { color: var(--muted); }

  #crm_root .icon     { width: 14px; height: 14px; display: inline-block; }
  #crm_root .icon svg { width: 100%; height: 100%; display: block; }

  #crm_root .graph {
    grid-column: 3;
    grid-row: 1 / 3;
    border: 1px dashed rgba(var(--clr-ink), 0.4);
    border-radius: var(--radius-sm);
    padding: 0.3px;
    background: var(--card);
    min-height: 130px;
    position: relative;
    z-index: 2;
  }
  #crm_root .graph canvas {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    display: block;
    border-radius: var(--radius-sm);
    cursor: crosshair;
    z-index: 1;
  }

  #crm_root .pc-totals {
    grid-column: 1 / -1;
    height: 0;
    opacity: 0;
    overflow: hidden;
    font-family: monospace;
    color: var(--muted);
    border-top: 0px solid rgba(var(--clr-ink), 0.12);
    transition: height 320ms cubic-bezier(0.4, 0, 0.2, 1),
                opacity 320ms ease,
                border-top-width 320ms ease;
  }
  #crm_root .pc-totals.open { opacity: 1; border-top-width: 1px; }
  #crm_root .pc-totals .inner { padding: 6px 8px 4px; font-size: 11px; font-family: monospace; color: var(--muted); }

} /* end desktop / landscape */

/* ═══════════════════════════════════════════════════════════════════
   8. LOADING OVERLAY & TOAST
   ═══════════════════════════════════════════════════════════════════ */
#loading-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 99999;
  font-family: system-ui, sans-serif;
  opacity: 1;
  transition: opacity 0.6s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }

.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(var(--clr-black), 0.1);
  border-top-color: #1f8ef1;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.loading-text { margin-top: 12px; font-size: 14px; color: #333; }

#poll-warn-toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #1e293b;
  color: #fcd34d;
  font-size: 13px;
  font-family: system-ui, sans-serif;
  padding: 9px 16px;
  border-radius: var(--radius-sm, 8px);
  box-shadow: 0 6px 20px rgba(var(--clr-black), 0.4);
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 99999;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 300ms ease, transform 300ms ease;
}
#poll-warn-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════════════════════════
   9. ANIMATIONS
   ═══════════════════════════════════════════════════════════════════ */
@keyframes hdrSweep {
  0%   { transform: scaleX(0); transform-origin: left;  opacity: 0.5; }
  48%  { transform: scaleX(1); transform-origin: left;  opacity: 1;   }
  52%  { transform: scaleX(1); transform-origin: right; opacity: 1;   }
  100% { transform: scaleX(0); transform-origin: right; opacity: 0.5; }
}
@keyframes spin       { to { transform: rotate(360deg); } }
@keyframes emptyPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }

/* ═══════════════════════════════════════════════════════════════════
   10. DARK MODE  (consolidated)
   ═══════════════════════════════════════════════════════════════════ */
@media (prefers-color-scheme: dark) {
  #crm_root {
    --text:        #e6eef8;
    --muted:       #9aa4b2;
    --line:        #16202b;
    --shadow-sm:   2px 2px 6px  rgba(var(--clr-black), 0.40);
    --shadow-md:   2px 2px 10px rgba(var(--clr-black), 0.45);
    --shadow-lg:   0 0 20px     rgba(var(--clr-abyss), 0.70);
    --accent-soft: rgba(var(--clr-accent), 0.10);
  }

  #crm_root header { border-color: rgba(var(--clr-white), 0.06); border-bottom-color: rgba(var(--clr-white), 0.09); }
  #crm_root #last  { color: rgba(31, 180, 241, 0.4); }

  #crm_root #forceRefreshBtn          { border-color: rgba(var(--clr-accent), 0.25); }
  #crm_root #forceRefreshBtn:hover    { color: rgba(var(--clr-white), 1); border-color: rgba(var(--clr-accent), 0.55); }

  #crm_root .select-mini .trigger .label,
  #crm_root .select-mini .trigger #autoLabel,
  #crm_root .select-mini .trigger #unitLabel                  { color: rgba(var(--clr-white), 0.75); }
  #crm_root .select-mini .trigger:hover .label,
  #crm_root .select-mini .trigger:hover #autoLabel,
  #crm_root .select-mini .trigger:hover #unitLabel,
  #crm_root .select-mini .trigger.glow .label,
  #crm_root .select-mini .trigger.glow #autoLabel,
  #crm_root .select-mini .trigger.glow #unitLabel             { color: rgba(var(--clr-white), 1); }

  #crm_root .dd-panel {
    background: #1a1f2e;
    border-color: rgba(var(--clr-accent), 0.30);
    box-shadow: 0 6px 20px rgba(var(--clr-abyss), 0.65);
  }
  #crm_root .dd-panel button.opt         { color: rgba(230, 238, 248, 0.50); }
  #crm_root .dd-panel button.opt:hover   { background: rgba(var(--clr-accent), 0.12); color: rgba(230, 238, 248, 0.92); }
  #crm_root .dd-panel button.opt.selected          { background: rgba(var(--clr-accent), 0.18); color: #64b8ff; }
  #crm_root .dd-panel button.opt.selected::before  { background: #64b8ff; }
  #crm_root #ifacePanel_pc.dd-panel button.opt { color: rgba(var(--clr-white), 0.90) !important; }
  #crm_root #ifacePanel_mob.dd-panel button.opt { color: rgba(var(--clr-white), 0.80) !important; }

  #crm_root .ssid-badge-24 { background: rgba(var(--clr-24), 0.13); border-color: rgba(var(--clr-24), 0.32); color: var(--text); }

  #crm_root .hint-badge-router_oui { background: rgba(245,158,11,0.18); border-color: rgba(245,158,11,0.38); color: #fbbf24; }
  #crm_root .hint-badge-gateway    { background: rgba(239,68,68,0.18);  border-color: rgba(239,68,68,0.38);  color: #fca5a5; }
  #crm_root .hint-badge-eth_issue  { background: rgba(239,68,68,0.16);  border-color: rgba(239,68,68,0.42);  color: #fca5a5; font-weight: 700; }

  #crm_root .port-badge { background: rgba(var(--clr-bridge), 0.20); border-color: rgba(var(--clr-bridge), 0.45); color: #a5b4fc; }

  /* Bridge/AP card header badge — white text in dark mode to match other card headers.
     Scoped to .band-title-wrap so the mini hint-badge-bridge on LAN client cards is unchanged.
     .port-badge (Port label) intentionally excluded — keeps its indigo colour. */

    background: rgba(var(--clr-bridge), 0.28);

    color: rgba(var(--clr-white), 0.92);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   11. SMALL SCREEN ADJUSTMENTS  (≤ 979 px)
   ═══════════════════════════════════════════════════════════════════ */
@media screen and (max-width: 979px) {
  #crm_root header { height: auto; min-height: 52px; padding: 7px 12px; }

  #crm_root #autoPanel.dd-panel button.opt { font-size: 12px !important; padding: 5px 8px; white-space: nowrap; }
  #crm_root #unitPanel.dd-panel,
  #crm_root #autoPanel.dd-panel { min-width: 100%; }
  #crm_root .empty-panel .panel-title,
  #crm_root .empty-panel .band-title { color: var(--muted); margin-top: -1px; }
  #crm_root .empty-panel .total-text { color: var(--muted); margin-bottom: 0px; margin-top: -1px;}
}

/* ═══════════════════════════════════════════════════════════════════
   12. DESKTOP DROPDOWN OVERRIDES  (≥ 980 px)
   ═══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   13. DEVICE-HINT BADGES & PORT BADGE
   ═══════════════════════════════════════════════════════════════════ */
#crm_root .hint-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

  display: inline-flex;
  align-items: center;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;

}
#crm_root .hint-badge-bridge     { background: rgba(var(--clr-bridge), 0.13); border: 1px solid rgba(var(--clr-bridge), 0.30); color: #818cf8; }

/* Port badge (Bridge AP — mirrors freq-badge, indigo) */
