        renderer.fadeIn(320);
        totals.addEventListener('transitionend', e => {
          if (e.propertyName === 'height' && totals.classList.contains('open'))
            totals.style.height = 'auto';
        }, { once: true });
      } else {
        totals.style.height = totals.offsetHeight + 'px';
        void card.offsetHeight;
        totals.style.height    = '0px';
        graphWrap.style.height = '0px';
        totals.classList.remove('open');
        graphWrap.classList.remove('open');
        card.classList.remove('graph-open');
        renderer.fadeOut(200);
      }
    }
    card.addEventListener('click', e => {
      if (e.target.closest('.select-mini')) return;
      setOpen(!totals.classList.contains('open'));
    });

    return card;
  }
}

function renderIfaceCard(ifaces, isDuplicate) {
  if (!ifaces || !ifaces.length) return;
  ifaceRatesData = ifaces;

  if (!selectedIface) {
    let stored = null;
    try { stored = localStorage.getItem(LS_IFACE_KEY); } catch(e) {}
    const nonCombined = ifaces.filter(i => !i.is_wifi_combined && !i.is_lan_port && !i.is_smart);
    const pick = (stored && ifaces.find(i => i.name === stored))
      || nonCombined.find(i => i.is_wan && i.operstate === 'up')
      || nonCombined.find(i => i.is_wan)
      || nonCombined.find(i => i.operstate === 'up')
      || nonCombined[0]
      || ifaces[0];
    selectedIface = pick.name;
  }

  const wrap    = qs('iface_rates_wrap');
  const safeKey = IFACE_BAND_KEY.replace(/[^a-zA-Z0-9_]/g, '_');

  const panelId = 'panel_' + safeKey;
  if (!qs(panelId)) {
    const section = document.createElement('section');
    section.className = 'mobile-panel band-iface';
    section.id = panelId; section.dataset.panel = IFACE_BAND_KEY;
    section.innerHTML =
      '<div class="panel-head">' +
        '<div class="panel-title">' + buildBandTitle(IFACE_BAND_KEY, false) + '</div>' +
      '</div>' +
      '<div class="list" id="list_' + safeKey + '"></div>';
    if (wrap) wrap.appendChild(section);
  }
  const listEl = qs('list_' + safeKey);
  if (listEl && !listEl.querySelector('.client')) {
    listEl.appendChild(createIfaceClientCard('mob', false, ifaces));
  } else {
    const panel = document.getElementById('ifacePanel_mob');
    if (panel) populateIfacePanel(panel, ifaces);
  }

  const pcBandId  = 'pc_band_' + safeKey;
  const pcInnerId = pcBandId + '_inner';
  if (!qs(pcBandId)) {
    const band = document.createElement('div');
    band.className = 'band band-iface'; band.id = pcBandId; band.dataset.band = IFACE_BAND_KEY;
    band.innerHTML =
      '<div class="band-head">' +
        '<h3 class="band-title">' + buildBandTitle(IFACE_BAND_KEY, false) + '</h3>' +
      '</div>' +
      '<div class="band-inner" id="' + pcInnerId + '"></div>';
    if (wrap) wrap.appendChild(band);
  }
  const inner = qs(pcInnerId);
  if (inner && !inner.querySelector('.client-wrapper')) {
    inner.appendChild(createIfaceClientCard('pc', true, ifaces));
  } else {
    const panel = document.getElementById('ifacePanel_pc');
    if (panel) populateIfacePanel(panel, ifaces);
  }

  const iface  = ifaces.find(i => i.name === selectedIface);
  ['pc','mob'].forEach(sfx => syncIfaceSelect(sfx, iface));
  const suffix = isMobile() ? 'mob' : 'pc';
  if (!isDuplicate) pushIfaceSample(iface, suffix);
}

/* ─────────────────────────────────────────────────────────────────
   DATA FETCHING
   ───────────────────────────────────────────────────────────────── */
async function tryFetch(url, timeout = 6000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeout);
  try {
    const res = await fetch(url, {
      credentials: 'same-origin',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      signal: ctrl.signal,
    });
    clearTimeout(tid);
    return res;
  } catch {
    clearTimeout(tid);
    return { ok: false, json: async () => ({}) };
  }
}

async function fetchData() {
  const res = await tryFetch(`${API_URL}?refresh=${window._rtc_interval_sec || 2}`);

  if (!res.ok) {
    const el = qs('pc_bands');
    if (el) Object.assign(el.style, { color: 'var(--muted)', fontSize: '13px', padding: '6px' });
    if (el) el.textContent = 'Data unavailable';
    qs('last').textContent = 'Last_Update: error';
    return;
  }

  let data;
  try { data = await res.json(); } catch { data = {}; }

  const isDuplicate = data._ts != null && data._ts === lastSeenTs;
  if (!isDuplicate && data._ts != null) lastSeenTs = data._ts;

  for (const [key, val] of Object.entries(data)) {
    const lk = key.toLowerCase();
    if (lk === 'lan' || lk === 'lan_totals' || lk === '_runtime_s' || lk === '_ts' || lk === 'bridge_clients') continue;
    if (val?.clients && val?.totals) {
      efficientRender(key, val.clients, false, val.totals, isDuplicate);
    }
  }

  efficientRender('LAN ports', data.lan || [], true, data.lan_totals || {}, isDuplicate);

  if (data.iface_rates && data.iface_rates.length) {
    renderIfaceCard(data.iface_rates, isDuplicate);
  }

  const activeBridgeKeys = new Set();
  for (const bp of (data.bridge_clients || [])) {
    if (bp.key && bp.totals) {
      activeBridgeKeys.add(bp.key);
      efficientRender(bp.key, bp.clients || [], false, bp.totals, isDuplicate);
    }
  }
  for (const key of (window._rtc_prev_bridge_keys || [])) {
    if (!activeBridgeKeys.has(key)) {
      const safeKey  = key.replace(/[^a-zA-Z0-9_-]/g, '_');
      const panelEl  = document.getElementById(`panel_${safeKey}`);
      const bandEl   = document.getElementById(`pc_band_${safeKey}`);
      if (panelEl)  panelEl.remove();
      if (bandEl)   bandEl.remove();
      if (window._rtc_panel_order) {
        window._rtc_panel_order = window._rtc_panel_order.filter(id => id !== `panel_${safeKey}`);
      }
      if (window._rtc_band_order) {
        window._rtc_band_order = window._rtc_band_order.filter(id => id !== `pc_band_${safeKey}`);
      }
    }
  }
  window._rtc_prev_bridge_keys = [...activeBridgeKeys];

  if (!isDuplicate) {
    qs('last').textContent = 'Last_Update: ' + new Date().toLocaleTimeString();
  }

  moveEmptyPanelsToBottom();
}

/* ─────────────────────────────────────────────────────────────────
   LOADING OVERLAY
   ───────────────────────────────────────────────────────────────── */
function showLoading() { qs('loading-overlay')?.classList.remove('hidden'); }
function hideLoading() { qs('loading-overlay')?.classList.add('hidden');    }

function initDropdown(miniId, triggerId, panelId, onSelect) {
  const mini    = qs(miniId);
  const trigger = qs(triggerId);
  const panel   = qs(panelId);
  if (!mini || !trigger || !panel) return;

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const open = mini.classList.toggle('open');
    trigger.setAttribute('aria-expanded', String(open));
    panel.setAttribute('aria-hidden', String(!open));
    trigger.classList.toggle('glow', open);
  });

  const opts = Array.from(panel.querySelectorAll('.opt'));
  opts.forEach((btn, i) => {
    btn.setAttribute('tabindex', '0');
    btn.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') { e.preventDefault(); opts[(i + 1) % opts.length].focus(); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); opts[(i - 1 + opts.length) % opts.length].focus(); }
    });
    btn.addEventListener('click', e => {
      e.stopPropagation();
      onSelect(btn);
      mini.classList.remove('open');
      panel.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      panel.setAttribute('aria-hidden', 'true');
      trigger.classList.remove('glow');
    });
  });

  document.addEventListener('click', e => {
    if (!mini.contains(e.target) && !panel.contains(e.target)) {
      mini.classList.remove('open');
      panel.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      panel.setAttribute('aria-hidden', 'true');
      trigger.classList.remove('glow');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      mini.classList.remove('open');
      panel.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      panel.setAttribute('aria-hidden', 'true');
      trigger.classList.remove('glow');
    }
  });
}

/* ─────────────────────────────────────────────────────────────────
   POLL INTERVAL CONTROL
   ───────────────────────────────────────────────────────────────── */
let toastTimer = null;
function showToast() {
  const t = qs('poll-warn-toast');
  if (!t) return;
  clearTimeout(toastTimer);
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function setAuto(sec) {
  if (window._rtc_timer) clearInterval(window._rtc_timer);
  window._rtc_timer = null;

  prevSnapshot = {};
  lastSeenTs   = null;

  if (sec > 0) window._rtc_timer = setInterval(fetchData, sec * 1000);
  window._rtc_interval_sec = sec > 0 ? sec : 2;

  const labelEl = qs('autoLabel');
  if (labelEl) labelEl.textContent = sec === 0 ? 'Off' : sec + 's';

  const warnEl = qs('triggerWarn');
  if (warnEl) warnEl.style.display = sec === 1 ? 'inline' : 'none';

  try { localStorage.setItem(LS_INTERVAL_KEY, String(sec)); } catch { /**/ }

  qs('autoPanel')?.querySelectorAll('.opt').forEach(btn => {
    const active = (parseInt(btn.dataset.val, 10) || 0) === sec;
    btn.classList.toggle('selected', active);
    btn.setAttribute('aria-selected', String(active));
  });

  allRenderers.forEach(r => { try { r.reconfigure(); } catch { /**/ } });
  if (sec === 1) showToast();
  if (window._rtc_stopCountdown) window._rtc_stopCountdown();
}

initDropdown('autoMini', 'autoTrigger', 'autoPanel', btn => setAuto(parseInt(btn.dataset.val, 10) || 0));

/* -- Force refresh button -- */
(function() {
  const btn = qs('forceRefreshBtn');
  if (!btn) return;

  let cooldownTimer = null;

  function startCooldown() {
    clearTimeout(cooldownTimer);
    const sec = window._rtc_interval_sec || 2;
    if (sec <= 0) return;
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.style.cursor  = 'not-allowed';
    cooldownTimer = setTimeout(() => {
      btn.disabled = false;
      btn.style.opacity = '';
      btn.style.cursor  = '';
    }, sec * 1000);
  }

  function stopCooldown() {
    clearTimeout(cooldownTimer);
    btn.disabled = false;
    btn.style.opacity = '';
    btn.style.cursor  = '';
  }

  btn.addEventListener('click', async () => {
    if (btn._spinning) return;
    btn._spinning = true;
    stopCooldown();
    const icon = btn.querySelector('.refresh-icon');
    let angle = 0, rafId;
    const spin = () => { angle = (angle + 6) % 360; if (icon) icon.style.transform = 'rotate(' + angle + 'deg)'; rafId = requestAnimationFrame(spin); };
    rafId = requestAnimationFrame(spin);
    btn._stopSpin = () => { cancelAnimationFrame(rafId); if (icon) icon.style.transform = ''; btn._spinning = false; };
    lastSeenTs = null;
    prevSnapshot = {};
    try {
      const res = await tryFetch(`${API_URL}?refresh=${window._rtc_interval_sec || 2}&force=1`);
      if (!res.ok) throw new Error('fetch failed');
      let data;
      try { data = await res.json(); } catch { data = {}; }
      if (data._ts != null) lastSeenTs = data._ts;
      for (const [key, val] of Object.entries(data)) {
        const lk = key.toLowerCase();
        if (lk === 'lan' || lk === 'lan_totals' || lk === '_runtime_s' || lk === '_ts' || lk === 'bridge_clients') continue;
        if (val?.clients && val?.totals) efficientRender(key, val.clients, false, val.totals, false);
      }
      efficientRender('LAN ports', data.lan || [], true, data.lan_totals || {}, false);
      if (data.iface_rates && data.iface_rates.length) renderIfaceCard(data.iface_rates, false);
      const activeBridgeKeys = new Set();
      for (const bp of (data.bridge_clients || [])) {
        if (bp.key && bp.totals) { activeBridgeKeys.add(bp.key); efficientRender(bp.key, bp.clients || [], false, bp.totals, false); }
      }
      window._rtc_prev_bridge_keys = [...activeBridgeKeys];
      qs('last').textContent = 'Last_Update: ' + new Date().toLocaleTimeString() + ' (forced)';
      moveEmptyPanelsToBottom();
    } catch(e) { console.error('Force refresh failed', e); }
    finally {
      if (btn._stopSpin) { btn._stopSpin(); btn._stopSpin = null; }
      startCooldown();
    }
  });

  /* Expose so setAuto() can restart countdown when poll interval changes */
  window._rtc_startCountdown = startCooldown;
  window._rtc_stopCountdown  = stopCooldown;
})();

const trigWarn = qs('triggerWarn');
const btn1s    = qs('autoPanel')?.querySelector('.opt[data-val="1"]');
[trigWarn, btn1s].forEach(el => {
  if (!el) return;
  el.addEventListener('mouseenter', () => { clearTimeout(toastTimer); qs('poll-warn-toast')?.classList.add('show'); });
  el.addEventListener('mouseleave', () => { toastTimer = setTimeout(() => qs('poll-warn-toast')?.classList.remove('show'), 200); });
});

const storedInterval = parseInt(localStorage.getItem(LS_INTERVAL_KEY), 10);
setAuto(Number.isFinite(storedInterval) && storedInterval >= 0 ? storedInterval : 2);

/* ─────────────────────────────────────────────────────────────────
   UNIT CONTROL (MB/s ↔ Mbps)
   ───────────────────────────────────────────────────────────────── */
function setUnit(unit) {
  window._rtc_unit = unit;
  const lbl = qs('unitLabel');
  if (lbl) lbl.textContent = unit === 'Mbps' ? 'Mbps' : 'MB/s';

  qs('unitPanel')?.querySelectorAll('.opt').forEach(btn => {
    const active = btn.dataset.unit === unit;
    btn.classList.toggle('selected', active);
    btn.setAttribute('aria-selected', String(active));
  });

  try { localStorage.setItem(LS_UNIT_KEY, unit); } catch { /**/ }

  Object.values(prevSnapshot).forEach(s => { delete s._lastRxStr; delete s._lastTxStr; });
  allRenderers.forEach(r => { try { r.draw(); } catch { /**/ } });
}

initDropdown('unitMini', 'unitTrigger', 'unitPanel', btn => setUnit(btn.dataset.unit));
setUnit(localStorage.getItem(LS_UNIT_KEY) === 'Mbps' ? 'Mbps' : 'MBs');

/* ─────────────────────────────────────────────────────────────────
   RESIZE / ORIENTATION / VISIBILITY
   ───────────────────────────────────────────────────────────────── */
function clearOppositeLayout(mobileMode) {
  const el  = qs(mobileMode ? 'pc_bands'   : 'mobile_grid');
  const cls = mobileMode    ? '.client-wrapper, .band' : '.client, .mobile-panel';
  if (!el) return;
  el.querySelectorAll(cls).forEach(node => {
    try { node._cleanup?.(); } catch { /**/ }
    node.remove();
  });
}

function refreshAll(showOverlay) {
  if (showOverlay) showLoading();
  clearOppositeLayout(isMobile());
  allRenderers.forEach(r => {
    try { r.reconfigure(); r.draw(); } catch { /**/ }
  });
  if (showOverlay) setTimeout(hideLoading, 1400);
}

let resizeTimer = null, lastWidth = window.innerWidth, lastMobile = isMobile();

window.addEventListener('orientationchange', () => refreshAll(true));
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const w        = window.innerWidth;
    const mobile   = isMobile();
    const modeFlip = mobile !== lastMobile;   /* true only when crossing pc↔mobile breakpoint */
    if (w !== lastWidth) {
      lastWidth  = w;
      lastMobile = mobile;
      refreshAll(modeFlip);                   /* overlay only on layout-mode change, not zoom */
    } else {
      allRenderers.forEach(r => { try { r.draw(); } catch { /**/ } });
    }
  }, 200);
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    allRenderers.forEach(r => { try { r.pause(); } catch { /**/ } });
  } else {
    allRenderers.forEach(r => { try { r.resume(); } catch { /**/ } });
  }
});

window.addEventListener('beforeunload', () => {
  allRenderers.forEach(r => { try { r.stop(); } catch { /**/ } });
});

(function watchDPR() {
  const dpr = window.devicePixelRatio || 1;
  const mq  = window.matchMedia(`(resolution: ${dpr}dppx)`);
  const cb  = () => {
    mq.removeEventListener('change', cb);
    allRenderers.forEach(r => { try { r.draw(); } catch { /**/ } });
    watchDPR();
  };
  mq.addEventListener('change', cb);
})();

/* ─────────────────────────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────────────────────────── */
setTimeout(() => { fetchData().catch(console.error); }, 10);

})();
</script>
